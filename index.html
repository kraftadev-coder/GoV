<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="CivicVoice — Infrastructure for Truth. A civic whistleblowing platform with verified evidence and zero-knowledge anonymity." />
  <meta name="theme-color" content="#0D1117" />

  <!-- Google Fonts: Editorial Brutalist Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <title>CivicVoice — Infrastructure for Truth</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <!-- Service Worker Registration — PWA Offline Support -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js')
          .then(function (reg) {
            console.log('[CivicVoice] SW registered:', reg.scope);
          })
          .catch(function (err) {
            console.log('[CivicVoice] SW registration failed:', err);
          });
      });
    }
  </script>
</body>

</html>
